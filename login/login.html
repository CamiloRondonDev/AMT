<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/login.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asociación Madre Tierra - Tienda</title>
</head>

<header>
    <div>
        <img src="/img/para banner.jpg" alt="Logo Madre Tierra">
    </div>
    <nav>
        <a href="#">Inicio</a>
        <a href="#">Contacto</a>
    </nav>
    <div class="cta-buttons">
        <a href="tel:+573026040049">+57 302 604 0049</a>
        <a href="/index.html">Inicio</a>
    </div>
</header>

<!-- Contenedor del Login -->
<div class="login-container">
    <form class="login-form">
        <h2>Iniciar sesión</h2>
        <div class="input-group">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" placeholder="Introduce tu usuario" required>
        </div>
        <div class="input-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="Introduce tu contraseña" required>
        </div>
        <button type="submit" class="btn-login">Iniciar sesión</button>
        
        <!-- Botones para crear cuenta y recuperar contraseña -->
        <div class="login-options">
            <a href="registerUser.html" class="btn-create-account">Crear cuenta nueva</a>
            <a href="#" class="btn-recover-password">¿Olvidaste tu contraseña?</a>
        </div>
    </form>
</div>

</body>

</html>
