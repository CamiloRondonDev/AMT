<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/aggProd.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Producto</title>
</head>

<body>
    <header>
        <div class="logo-container">
            <img src="/img/para banner.jpg" alt="Logo Asociación Madre Tierra" class="logo">
            <p class="title">Agregar Producto</p>
        </div>
    </header>

    <div class="container">
        <form id="addProductForm">
            <label for="addProductName">Nombre del Producto:</label>
            <input type="text" id="addProductName" name="nombre_producto" placeholder="Ej. Producto Ecológico" required>
    
            <label for="addFactory">Punto Fábrica Producto:</label>
            <input type="text" id="addFactory" name="Fabrica_producto" placeholder="Ej. municipio de fabricación" required>
    
            <label for="addCoverage">Cobertura de Venta:</label>
            <input type="text" id="addCoverage" name="covetruraVenta_producto" placeholder="Ej. Nacional, Internacional" required>
    
            <label for="addAvailability">Disponibilidad:</label>
            <input type="text" id="addAvailability" name="disponivilidad_producto" placeholder="Ej. En stock, Bajo pedido" required>
    
            <label for="addProductType">Tipo de Producto:</label>
            <select id="addProductType" name="tipo_producto" required>
                <option value="bien">Bien</option>
                <option value="servicio">Servicio</option>
            </select>
    
            <label for="addProductPrice">Precio ($):</label>
            <input type="number" id="addProductPrice" name="precio_producto" placeholder="Ej. 50000" required>
    
            <label for="addProductImage">URL de Imagen:</label>
            <input type="url" id="addProductImage" name="Imagen_producto" placeholder="Ej. https://example.com/img.jpg" required>
    
            <label for="addProductDescription">Descripción:</label>
            <textarea id="addProductDescription" name="descrop_producto" rows="4" placeholder="Breve descripción del producto..." required></textarea>
    
            <label for="addCategory">Categoría del Producto:</label>
            <input type="text" id="addCategory" name="categoria_prducto" placeholder="Ej. Tecnología, Moda" required>
    
            <label for="addSocialMedia">Red Social:</label>
            <input type="url" id="addSocialMedia" name="redSocial_producto" placeholder="Ej. https://facebook.com/miempresa">
    
            <label for="addObservations">Observaciones:</label>
            <textarea id="addObservations" name="observaciones_producto" rows="3" placeholder="Notas adicionales..."></textarea>
     
            <button type="submit">Guardar Producto</button>
        </form>
    </div>
    

    <footer class="footer">
        <p>&copy; 2025 Asociación Madre Tierra. Todos los derechos reservados.</p>
    </footer>

    <script>
        document.getElementById("addProductForm").addEventListener("submit", function (event) {
            event.preventDefault();
            alert("Producto agregado exitosamente.");
        });
    </script>
</body>

</html>
