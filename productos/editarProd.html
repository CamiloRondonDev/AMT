<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/editProd.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Producto</title>
    
</head>

<body>
    <header>
        <div class="logo-container">
            <img src="/img/para banner.jpg" alt="Logo Asociación Madre Tierra" class="logo">
            <p class="title">Editar Producto</p>
        </div>
    </header>

    <div class="container">
        <form id="editProductForm">
            <label for="productSelect">Seleccionar Producto:</label>
            <select id="productSelect" name="productSelect" required>
                <option value="" disabled selected>Seleccione un producto...</option>
                <option value="1">Producto 1</option>
                <option value="2">Producto 2</option>
                <option value="3">Producto 3</option>
            </select>

            <label for="editProductName">Nombre del Producto:</label>
            <input type="text" id="editProductName" name="nombre_producto" placeholder="Ej. Producto Ecológico">

            <label for="editFactory">Punto Fábrica Producto:</label>
            <input type="text" id="editFactory" name="Fabrica_producto" placeholder="Ej. municipio de fabricación">

            <label for="editCoverage">Cobertura de Venta:</label>
            <input type="text" id="editCoverage" name="covetruraVenta_producto" placeholder="Ej. Nacional, Internacional">

            <label for="editAvailability">Disponibilidad:</label>
            <input type="text" id="editAvailability" name="disponivilidad_producto" placeholder="Ej. En stock, Bajo pedido">

            <label for="editProductType">Tipo de Producto:</label>
            <select id="editProductType" name="tipo_producto">
                <option value="bien">Bien</option>
                <option value="servicio">Servicio</option>
            </select>

            <label for="editProductPrice">Precio ($):</label>
            <input type="number" id="editProductPrice" name="precio_producto" placeholder="Ej. 50000">

            <label for="editProductImage">URL de Imagen:</label>
            <input type="url" id="editProductImage" name="Imagen_producto" placeholder="Ej. https://example.com/img.jpg">

            <label for="editProductDescription">Descripción:</label>
            <textarea id="editProductDescription" name="descrop_producto" rows="4" placeholder="Breve descripción del producto..."></textarea>

            <label for="editCategory">Categoría del Producto:</label>
            <input type="text" id="editCategory" name="categoria_prducto" placeholder="Ej. Tecnología, Moda">

            <label for="editSocialMedia">Red Social:</label>
            <input type="url" id="editSocialMedia" name="redSocial_producto" placeholder="Ej. https://facebook.com/miempresa">

            <label for="editObservations">Observaciones:</label>
            <textarea id="editObservations" name="observaciones_producto" rows="3" placeholder="Notas adicionales..."></textarea>

            <button type="submit">Actualizar Producto</button>
        </form>
    </div>


    <footer class="footer">
        <p>&copy; 2025 Asociación Madre Tierra. Todos los derechos reservados.</p>
    </footer>

    <script>
        document.getElementById("editProductForm").addEventListener("submit", function (event) {
            event.preventDefault();
            alert("Producto actualizado exitosamente.");
        });
    </script>
</body>

</html>
